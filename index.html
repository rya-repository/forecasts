<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="300">
  <title>Venue Forecast Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="screen-layout">
    <section class="forecast-column">
      <header class="panel-header">
        <h1>Venue Forecasts</h1>
        <p id="updated-at">Loading forecast panels...</p>
      </header>
      <div id="forecast-list" class="forecast-list" aria-live="polite"></div>
    </section>

    <aside class="map-column">
      <header class="panel-header panel-header--map">
        <h2>Regional View</h2>
      </header>
      <div id="map-panel" class="map-panel"></div>
    </aside>
  </main>

  <template id="venue-template">
    <article class="forecast-card">
      <header class="forecast-card__header">
        <h3 class="forecast-card__title"></h3>
      </header>
      <div class="forecast-crop">
        <iframe class="forecast-frame" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
